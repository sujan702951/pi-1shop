<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>1shop.pi Marketplace</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

header{
background:#131921;
color:white;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
font-size:22px;
font-weight:bold;
}

.search{
width:50%;
}

.search input{
width:100%;
padding:8px;
border-radius:4px;
border:none;
}

.container{
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
text-align:center;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:6px;
}

button{
background:#ff9900;
border:none;
padding:10px;
margin-top:10px;
border-radius:5px;
cursor:pointer;
}

footer{
background:#131921;
color:white;
text-align:center;
padding:10px;
margin-top:20px;
}
</style>
</head>

<body>

<header>
<div class="logo">1shop.pi</div>
<div class="search">
<input type="text" placeholder="Search products...">
</div>
</header>

<div class="container">

<h2>Popular Products</h2>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Mobile Phone</h3>
<p>Price: 5 Pi</p>
<button>Buy with Pi</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Electronics</h3>
<p>Price: 8 Pi</p>
<button>Buy with Pi</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Clothes</h3>
<p>Price: 3 Pi</p>
<button>Buy with Pi</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Grocery</h3>
<p>Price: 2 Pi</p>
<button>Buy with Pi</button>
</div>

</div>

</div>

<footer>
© 1shop.pi – Pi Powered Marketplace
</footer>

</body>
</html>
